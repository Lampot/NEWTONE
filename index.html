<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<link href="https://fonts.cdnfonts.com/css/vcr-osd-mono" rel="stylesheet">
<style>
body{
 background:black;
 color:white;
 font-family:'VCR OSD Mono', monospace;
 display:flex;
 align-items:center;
 justify-content:center;
 height:100vh;
 margin:0;
 overflow:hidden;
}

.container{
 text-align:center;
 animation:fadeIn 2s ease;
}

img{
 width:280px;
 margin:40px 0;
 animation:float 6s ease-in-out infinite;
 filter:grayscale(100%);
 user-select:none;
 -webkit-user-drag:none;
}

#countdown{
 font-size:32px;
 letter-spacing:4px;
}

.title{
 color:white;
 text-decoration:none;
}

.title:hover{
 color:grey;
}

@keyframes fadeIn{
 from{opacity:0; transform:translateY(20px)}
 to{opacity:1; transform:translateY(0)}
}

@keyframes float{
 0%{transform:translateY(0px)}
 50%{transform:translateY(-15px)}
 100%{transform:translateY(0px)}
}
</style>
</head>
<body>

<div class="container">
<div id="countdown"></div>

<img src="https://i.imgur.com/jewkbDy.png" draggable="false" oncontextmenu="return false;"/>

<div>
<a class="title" href="https://open.spotify.com/artist/6NvjKnOvxSoVbuv4uDhBgw?si=siBeu_ihTRW4_3yndyx-5Q" target="_blank">
GOD COMPLEX
</a>
</div>

</div>

<script>
const target = new Date("May 1, 2026 00:00:00").getTime();

setInterval(()=>{
 const now = new Date().getTime();
 const diff = target - now;

 const days = Math.floor(diff/(1000*60*60*24));
 const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
 const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
 const seconds = Math.floor((diff%(1000*60))/1000);

 document.getElementById("countdown").innerHTML =
 `${days}D ${hours}H ${minutes}M ${seconds}S`;
},1000);
</script>

</body>
</html>
